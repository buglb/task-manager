    <script>
        // 数据存储
        const STORAGE_KEYS = {
            TODOS: 'abin_todos',
            PLANS: 'abin_plans',
            FILES: 'abin_files',
            CATEGORIES: 'abin_categories'
        };

        // 提醒相关变量
        let reminderInterval = null;
        let currentFilterCategory = 'all';

        // 获取数据
        function getData(key) {
            try {
                return JSON.parse(localStorage.getItem(key)) || [];
            } catch {
                return [];
            }
        }

        // 保存数据
        function saveData(key, data) {
            localStorage.setItem(key, JSON.stringify(data));
        }

        // 初始化日期输入框为今天
        function initDateInput() {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('todo-date').value = today;
        }

        // ==================== 激励语 ====================
        const MOTIVATION_KEY = 'abin_motivation';

        function initMotivation() {
            const saved = localStorage.getItem(MOTIVATION_KEY);
            if (saved) {
                document.getElementById('motivation-text').textContent = saved;
            }
        }

        function editMotivation() {
            const textEl = document.getElementById('motivation-text');
            const inputEl = document.getElementById('motivation-input');
            textEl.classList.add('hidden');
            inputEl.classList.remove('hidden');
            inputEl.value = textEl.textContent.replace(/\s*[\u4e00-\u9fa5\w]+$/, '').trim();
            inputEl.focus();
            inputEl.select();
        }

        function saveMotivation() {
            const textEl = document.getElementById('motivation-text');
            const inputEl = document.getElementById('motivation-input');
            const value = inputEl.value.trim() || '今日加油 💪';
            textEl.textContent = value;
            localStorage.setItem(MOTIVATION_KEY, value);
            inputEl.classList.add('hidden');
            textEl.classList.remove('hidden');
        }

        // ==================== 待办事项 ====================
        let currentFilter = 'today';

        function getTodayStr() {
            return new Date().toISOString().split('T')[0];
        }

        function getWeekRange() {
            const today = new Date();
            const dayOfWeek = today.getDay();
            const monday = new Date(today);
            monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            return { start: monday.toISOString().split('T')[0], end: sunday.toISOString().split('T')[0] };
        }

        function filterTodos(todos) {
            const today = getTodayStr();
            const week = getWeekRange();

            return todos.filter(todo => {
                // 每日重复任务：始终显示（只要不是未来的日期）
                if (todo.repeat === 'daily') {
                    if (currentFilter === 'today') {
                        return true; // 今天需要显示
                    } else if (currentFilter === 'week') {
                        return todo.date <= week.end; // 本周内创建的都显示
                    }
                    return true; // 全部显示
                }

                // 普通任务
                if (currentFilter === 'today') {
                    return todo.date === today;
                } else if (currentFilter === 'week') {
                    return todo.date >= week.start && todo.date <= week.end;
                }
                return true;
            });
        }

        function getStreakDays(todo) {
            if (!todo.completedDates || todo.completedDates.length === 0) return 0;

            const sortedDates = [...todo.completedDates].sort().reverse();
            const today = getTodayStr();

            // 检查今天是否已完成
            const todayCompleted = sortedDates[0] === today;
            let streak = 0;
            let checkDate = today;

            // 从今天往前数
            for (let i = 0; i < 365; i++) {
                if (sortedDates.includes(checkDate)) {
                    streak++;
                    // 前一天
                    const d = new Date(checkDate);
                    d.setDate(d.getDate() - 1);
                    checkDate = d.toISOString().split('T')[0];
                } else if (i === 0) {
                    // 今天没完成，不算中断，继续检查昨天
                    const d = new Date(checkDate);
                    d.setDate(d.getDate() - 1);
                    checkDate = d.toISOString().split('T')[0];
                } else {
                    break;
                }
            }

            return streak;
        }

        function renderTodos() {
            const todos = getData(STORAGE_KEYS.TODOS);
            const filtered = filterTodos(todos);
            const listEl = document.getElementById('todo-list');
            const today = getTodayStr();

            // 统计今日所有任务（包括已完成和未完成）
            const todayTotal = todos.filter(t => {
                if (t.repeat === 'daily') {
                    return true; // 每日任务都算
                }
                return t.date === today; // 普通任务按日期
            }).length;

            // 统计今日已完成的任务
            const todayCompleted = todos.filter(t => {
                if (t.repeat === 'daily') {
                    return t.completedDates?.includes(today);
                }
                return t.completed && t.date === today;
            }).length;

            // 今日待办 = 总数 - 已完成
            const todayRemaining = todayTotal - todayCompleted;

            // 计算颜色：绿色(>70%)、黄色(30-70%)、红色(<30%)
            const percent = todayTotal > 0 ? todayCompleted / todayTotal : 0;
            const progressColor = percent >= 0.7 ? 'var(--success)' : percent >= 0.3 ? 'var(--warning)' : 'var(--danger)';
            
            document.getElementById('todo-stats').innerHTML = `
                <div class="stat-item" style="min-width: 120px;">
                    <div class="stat-num">${todayRemaining}</div>
                    <div class="stat-label">今日待办</div>
                </div>
                <div class="stat-item" style="min-width: 140px;">
                    <div class="circular-progress" id="daily-progress">
                        <svg viewBox="0 0 100 100">
                            <circle class="bg-circle" cx="50" cy="50" r="40"/>
                            <circle cx="50" cy="50" r="40"
                                fill="none"
                                stroke="${progressColor}"
                                stroke-width="8"
                                stroke-linecap="round"
                                stroke-dasharray="251.2 502.4"
                                stroke-dashoffset="${251.2 - (todayTotal > 0 ? 251.2 * todayCompleted / todayTotal : 0)}"/>
                        </svg>
                        <div class="progress-text">
                            <span class="progress-percent">${todayTotal > 0 ? Math.round((todayCompleted / todayTotal) * 100) : 0}%</span>
                            <span class="progress-count">${todayCompleted}/${todayTotal}</span>
                        </div>
                    </div>
                    <div class="stat-label" style="margin-top: 8px;">今日打卡</div>
                </div>
            `;

            if (filtered.length === 0) {
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📋</div>
                        <div class="empty-state-text">暂无任务，添加一个开始吧！</div>
                    </div>
                `;
                return;
            }

            // 处理每日重复任务的完成状态（按日期）
            const processedTodos = filtered.map(todo => {
                if (todo.repeat === 'daily') {
                    return {
                        ...todo,
                        isCompletedToday: todo.completedDates?.includes(today) || false,
                        streak: getStreakDays(todo)
                    };
                }
                return { ...todo, isCompletedToday: todo.completed, streak: 0 };
            });

            // 按完成状态和日期排序
            processedTodos.sort((a, b) => {
                if (a.isCompletedToday !== b.isCompletedToday) return a.isCompletedToday ? 1 : -1;
                if (a.repeat === 'daily' && b.repeat !== 'daily') return 1;
                if (a.repeat !== 'daily' && b.repeat === 'daily') return -1;
                return a.date.localeCompare(b.date);
            });

            listEl.innerHTML = processedTodos.map(todo => `
                <div class="todo-item ${todo.isCompletedToday ? 'completed' : ''} ${todo.repeat === 'daily' ? 'daily' : ''}">
                    <div class="todo-checkbox" onclick="toggleTodo(${todo.id})"></div>
                    <div class="todo-content">
                        <div class="todo-text">${escapeHtml(todo.text)}</div>
                        <div class="todo-meta">
                            ${todo.repeat === 'daily' ? `
                                <span class="todo-daily-badge ${todo.isCompletedToday ? 'inactive' : ''}">
                                    🔄 ${todo.isCompletedToday ? '已打卡' : '打卡'} <span class="streak">${todo.streak}</span>天
                                </span>
                            ` : `
                                <span>📅 ${formatDate(todo.date)}</span>
                            `}
                            <span class="todo-priority priority-${todo.priority}">
                                ${todo.priority === 'high' ? '🔴 高' : todo.priority === 'medium' ? '🟡 中' : todo.priority === 'daily' ? '🌿 日常' : '🟢 低'}
                            </span>
                            ${todo.reminder && !todo.isCompletedToday ? `
                                <span class="todo-reminder-badge" onclick="toggleReminder(${todo.id}, event)">
                                    🔔 提醒中（点击关闭）
                                </span>
                            ` : ''}
                        </div>
                    </div>
                    <div class="todo-actions">
                        <button class="btn-icon btn-edit" onclick="editTodo(${todo.id})">✏️</button>
                        <button class="btn-icon btn-delete" onclick="deleteTodo(${todo.id})">🗑️</button>
                    </div>
                </div>
            `).join('');

            // 渲染提醒任务横幅
            renderReminderTasksBanner();
        }

        function addTodo() {
            const input = document.getElementById('todo-input');
            const date = document.getElementById('todo-date');
            const priority = document.getElementById('todo-priority');
            const repeat = document.getElementById('todo-repeat');
            const reminder = document.getElementById('todo-reminder');

            const text = input.value.trim();
            if (!text) {
                input.focus();
                return;
            }

            const isDaily = repeat.checked;
            const hasReminder = reminder.checked;
            const todos = getData(STORAGE_KEYS.TODOS);
            todos.push({
                id: Date.now(),
                text,
                date: isDaily ? getTodayStr() : (date.value || getTodayStr()),
                priority: priority.value,
                repeat: isDaily ? 'daily' : null,
                completedDates: [],
                reminder: hasReminder,
                lastReminderSent: null,
                createdAt: new Date().toISOString()
            });

            saveData(STORAGE_KEYS.TODOS, todos);
            closeAddTodoModal();
            renderTodos();
            startReminderChecker();
        }

        // 显示添加任务模态框
        function showAddTodoModal() {
            // 重置表单
            document.getElementById('todo-input').value = '';
            document.getElementById('todo-date').value = getTodayStr();
            document.getElementById('todo-priority').value = 'medium';
            document.getElementById('todo-repeat').checked = false;
            document.getElementById('todo-reminder').checked = false;
            // 显示模态框
            document.getElementById('add-todo-modal').classList.add('active');
            // 自动聚焦到输入框
            document.getElementById('todo-input').focus();
        }

        // 关闭添加任务模态框
        function closeAddTodoModal() {
            document.getElementById('add-todo-modal').classList.remove('active');
        }

        function toggleTodo(id) {
            const todos = getData(STORAGE_KEYS.TODOS);
            const todo = todos.find(t => t.id === id);
            if (todo) {
                const today = getTodayStr();

                // 每日重复任务：按日期打卡/取消
                if (todo.repeat === 'daily') {
                    if (!todo.completedDates) todo.completedDates = [];
                    const idx = todo.completedDates.indexOf(today);
                    if (idx === -1) {
                        todo.completedDates.push(today);
                    } else {
                        todo.completedDates.splice(idx, 1);
                    }
                } else {
                    // 普通任务
                    todo.completed = !todo.completed;
                    todo.completedAt = todo.completed ? new Date().toISOString() : null;
                }

                saveData(STORAGE_KEYS.TODOS, todos);
                renderTodos();
            }
        }

        function editTodo(id) {
            const todos = getData(STORAGE_KEYS.TODOS);
            const todo = todos.find(t => t.id === id);
            if (todo) {
                document.getElementById('edit-id').value = id;
                document.getElementById('edit-text').value = todo.text;
                document.getElementById('edit-date').value = todo.date;
                document.getElementById('edit-priority').value = todo.priority;
                document.getElementById('edit-repeat').checked = todo.repeat === 'daily';
                document.getElementById('edit-reminder').checked = todo.reminder === true;
                document.getElementById('edit-modal').classList.add('active');
            }
        }

        function saveEdit() {
            const id = parseInt(document.getElementById('edit-id').value);
            const text = document.getElementById('edit-text').value.trim();
            const date = document.getElementById('edit-date').value;
            const priority = document.getElementById('edit-priority').value;
            const repeat = document.getElementById('edit-repeat');
            const reminder = document.getElementById('edit-reminder');

            if (!text) return;

            const todos = getData(STORAGE_KEYS.TODOS);
            const todo = todos.find(t => t.id === id);
            if (todo) {
                const isDaily = repeat.checked;
                todo.text = text;
                todo.date = isDaily ? getTodayStr() : date;
                todo.priority = priority;
                todo.repeat = isDaily ? 'daily' : null;
                todo.reminder = reminder.checked;
                saveData(STORAGE_KEYS.TODOS, todos);
                closeEditModal();
                renderTodos();
                startReminderChecker();
            }
        }

        function closeEditModal() {
            document.getElementById('edit-modal').classList.remove('active');
        }

        function deleteTodo(id) {
            if (!confirm('确定要删除这个任务吗？')) return;
            const todos = getData(STORAGE_KEYS.TODOS);
            const filtered = todos.filter(t => t.id !== id);
            saveData(STORAGE_KEYS.TODOS, filtered);
            renderTodos();
        }

        // ==================== 提醒功能 ====================
        function toggleReminder(id, event) {
            if (event) event.stopPropagation();
            const todos = getData(STORAGE_KEYS.TODOS);
            const todo = todos.find(t => t.id === id);
            if (todo) {
                todo.reminder = !todo.reminder;
                saveData(STORAGE_KEYS.TODOS, todos);
                renderTodos();
                startReminderChecker();
                renderReminderTasksBanner();
            }
        }

        function requestNotificationPermission() {
            if (!('Notification' in window)) {
                alert('您的浏览器不支持通知功能');
                return;
            }

            Notification.requestPermission().then(permission => {
                if (permission === 'granted') {
                    startReminderChecker();
                    // 发送测试通知
                    new Notification('🔔 提醒已开启', {
                        body: '您设置的待办任务将每10分钟提醒您',
                        icon: '🔔'
                    });
                } else {
                    alert('您拒绝了通知权限，可以在浏览器设置中开启');
                }
            });
        }

        function checkNotificationPermission() {
            // 总是显示提醒任务横幅
            renderReminderTasksBanner();
            return false;
        }

        // 渲染提醒任务横幅
        function renderReminderTasksBanner() {
            const todos = getData(STORAGE_KEYS.TODOS);
            const today = getTodayStr();
            const banner = document.getElementById('reminder-tasks-banner');
            const list = document.getElementById('reminder-tasks-list');

            // 获取所有开启了提醒的任务
            const reminderTasks = todos.filter(t => t.reminder);

            if (reminderTasks.length === 0) {
                banner.classList.add('hidden');
                return;
            }

            // 显示横幅
            banner.classList.remove('hidden');

            // 渲染任务列表
            let html = '';
            reminderTasks.forEach(todo => {
                // 检查是否已完成
                const isCompleted = todo.repeat === 'daily'
                    ? (todo.completedDates?.includes(today))
                    : (todo.completed && todo.date === today);

                html += `
                    <div class="reminder-task-item ${isCompleted ? 'completed' : ''}" onclick="navigateToTodo(${todo.id})">
                        <span class="task-name">${escapeHtml(todo.text)}</span>
                        <span class="task-status">${isCompleted ? '✓ 已完成' : '待完成'}</span>
                    </div>
                `;
            });

            list.innerHTML = html;
        }

        // 点击提醒任务跳转到对应任务
        function navigateToTodo(id) {
            // 切换到待办页面
            showPage('todo');
            // 高亮对应任务（简单实现：滚动到任务附近）
            const todoElement = document.querySelector(`[data-todo-id="${id}"]`);
            if (todoElement) {
                todoElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                // 闪烁效果
                todoElement.classList.add('highlight');
                setTimeout(() => todoElement.classList.remove('highlight'), 1000);
            }
        }

        function sendReminderNotification() {
            if (!('Notification' in window) || Notification.permission !== 'granted') {
                return;
            }

            const todos = getData(STORAGE_KEYS.TODOS);
            const today = getTodayStr();
            const now = new Date();

            // 收集所有需要提醒的任务
            const reminderTasks = [];
            todos.forEach(todo => {
                if (!todo.reminder) return;

                // 检查是否已完成
                const isCompleted = todo.repeat === 'daily'
                    ? (todo.completedDates?.includes(today))
                    : (todo.completed && todo.date === today);

                if (isCompleted) return;

                // 检查是否刚提醒过（同一小时内不重复提醒）
                const lastSent = todo.lastReminderSent ? new Date(todo.lastReminderSent) : null;
                if (lastSent) {
                    const minDiff = (now - lastSent) / (1000 * 60);
                    if (minDiff < 10) return; // 10分钟内不重复提醒
                }

                reminderTasks.push(todo);
            });

            // 发送一条通知，列出所有待提醒任务
            if (reminderTasks.length > 0) {
                const taskList = reminderTasks.map(t => `• ${t.text}`).join('\n');
                const notification = new Notification('📝 待办提醒', {
                    body: `还有 ${reminderTasks.length} 个任务待完成：\n${taskList}`,
                    icon: '📋',
                    tag: 'todo-reminder',
                    requireInteraction: false
                });

                notification.onclick = function() {
                    window.focus();
                    notification.close();
                };

                // 更新最后提醒时间
                reminderTasks.forEach(todo => {
                    todo.lastReminderSent = now.toISOString();
                });
                saveData(STORAGE_KEYS.TODOS, todos);
            }
        }

        function startReminderChecker() {
            const todos = getData(STORAGE_KEYS.TODOS);
            const hasReminder = todos.some(t => t.reminder);

            if (hasReminder && 'Notification' in window && Notification.permission === 'granted') {
                if (!reminderInterval) {
                    // 每10分钟检查一次
                    reminderInterval = setInterval(sendReminderNotification, 10 * 60 * 1000);
                    // 立即检查一次
                    sendReminderNotification();
                }
            } else {
                if (reminderInterval) {
                    clearInterval(reminderInterval);
                    reminderInterval = null;
                }
            }
        }

        // ==================== 日历 ====================
        let currentMonth = new Date();
        let selectedDate = null;

        function renderCalendar() {
            const year = currentMonth.getFullYear();
            const month = currentMonth.getMonth();
            const today = new Date();

            document.getElementById('calendar-title').textContent = `${year}年${month + 1}月`;

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDay = firstDay.getDay();
            const totalDays = lastDay.getDate();

            const todos = getData(STORAGE_KEYS.TODOS);
            // 普通任务日期
            const taskDates = new Set(todos.filter(t => t.repeat !== 'daily').map(t => t.date));
            // 每日重复任务：每天都有
            const hasDailyTask = todos.some(t => t.repeat === 'daily');

            let html = '';
            let dayCount = 1;

            // 上月空白
            for (let i = 0; i < startDay; i++) {
                const prevDate = new Date(year, month, -startDay + i + 1);
                html += `<div class="calendar-day other-month">${prevDate.getDate()}</div>`;
            }

            // 当月日期
            for (let i = 1; i <= totalDays; i++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                const isToday = year === today.getFullYear() && month === today.getMonth() && i === today.getDate();
                const hasTask = taskDates.has(dateStr) || (hasDailyTask && dateStr <= today.toISOString().split('T')[0]);
                const isSelected = selectedDate === dateStr;

                let classes = 'calendar-day';
                if (isToday) classes += ' today';
                if (hasTask) classes += ' has-task';
                if (isSelected) classes += ' selected';

                html += `<div class="${classes}" onclick="selectDate('${dateStr}')">${i}</div>`;
            }

            // 补足空白
            const remaining = 42 - (startDay + totalDays);
            for (let i = 1; i <= remaining; i++) {
                html += `<div class="calendar-day other-month">${i}</div>`;
            }

            document.getElementById('calendar-days').innerHTML = html;

            // 显示选中日期的任务
            if (selectedDate) {
                renderDayTasks(selectedDate);
            }
        }

        function changeMonth(delta) {
            currentMonth.setMonth(currentMonth.getMonth() + delta);
            renderCalendar();
        }

        function selectDate(dateStr) {
            selectedDate = dateStr;
            renderCalendar();
        }

        function renderDayTasks(dateStr) {
            const todos = getData(STORAGE_KEYS.TODOS);
            // 普通任务：当天创建的任务
            const dayTodos = todos.filter(t => t.date === dateStr && t.repeat !== 'daily');
            // 每日重复任务：所有每日任务都显示在该日期
            const dailyTodos = todos.filter(t => t.repeat === 'daily');

            const container = document.getElementById('day-tasks');
            const allDayTodos = [...dailyTodos.map(t => ({
                ...t,
                isDaily: true,
                isCompleted: t.completedDates?.includes(dateStr) || false
            })), ...dayTodos.map(t => ({ ...t, isDaily: false, isCompleted: t.completed }))];

            const totalCount = allDayTodos.length;

            container.innerHTML = `
                <div class="day-tasks-title">📅 ${formatDate(dateStr)} 的任务 (${totalCount}个)</div>
                ${totalCount === 0 ? '<div class="empty-state"><div class="empty-state-text">这天没有任务</div></div>' : ''}
                ${allDayTodos.map(todo => `
                    <div class="todo-item ${todo.isCompleted ? 'completed' : ''} ${todo.isDaily ? 'daily' : ''}">
                        <div class="todo-checkbox" onclick="toggleTodo(${todo.id}); renderCalendar();"></div>
                        <div class="todo-content">
                            <div class="todo-text">${escapeHtml(todo.text)}</div>
                            <div class="todo-meta">
                                ${todo.isDaily ? `
                                    <span class="todo-daily-badge ${todo.isCompleted ? 'inactive' : ''}">
                                        🔄 ${todo.isCompleted ? '已打卡' : '打卡'}
                                    </span>
                                ` : ''}
                                <span class="todo-priority priority-${todo.priority}">
                                    ${todo.priority === 'high' ? '🔴 高' : todo.priority === 'medium' ? '🟡 中' : '🟢 低'}
                                </span>
                            </div>
                        </div>
                    </div>
                `).join('')}
            `;
        }

        // ==================== 长期计划 ====================
        function renderPlans() {
            const plans = getData(STORAGE_KEYS.PLANS);
            const files = getData(STORAGE_KEYS.FILES);
            const container = document.getElementById('plan-list');

            if (plans.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <div class="empty-state-text">暂无长期计划，设定一个目标吧！</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = plans.map(plan => {
                let statusClass = '';
                let statusText = '进行中';
                if (plan.status === 'warning') {
                    statusClass = 'warning';
                    statusText = '遇到问题';
                } else if (plan.status === 'stuck') {
                    statusClass = 'danger';
                    statusText = '停滞不前';
                }

                // 获取计划的关联资料
                const attachments = (plan.attachments || []).map(attId => files.find(f => f.id === attId)).filter(Boolean);

                return `
                    <div class="plan-item ${statusClass}">
                        <div class="plan-header">
                            <span class="plan-title">${escapeHtml(plan.title)}</span>
                            <span class="plan-status status-${plan.status}">${statusText}</span>
                        </div>
                        ${plan.desc ? `<p style="font-size: 13px; color: var(--text-light); margin: 8px 0;">${escapeHtml(plan.desc)}</p>` : ''}
                        <div class="plan-attachments">
                            <div class="plan-attachments-header" onclick="toggleAttachments(${plan.id})">
                                <span>📎 关联资料 (${attachments.length})</span>
                                <span class="plan-attachments-toggle" id="toggle-${plan.id}">▼</span>
                            </div>
                            <div class="plan-attachment-list" id="attachments-${plan.id}" style="display: none;">
                                ${attachments.length === 0 ? '<span style="font-size: 13px; color: var(--text-light);">暂无关联资料</span>' : attachments.map(att => `
                                    <div class="plan-attachment-item" onclick="downloadFile(${att.id})">
                                        ${getFileIcon(att.type)} ${escapeHtml(att.name.length > 15 ? att.name.substring(0, 15) + '...' : att.name)}
                                        <button class="remove-btn" onclick="event.stopPropagation(); removeAttachment(${plan.id}, ${att.id})">×</button>
                                    </div>
                                `).join('')}
                                <div class="plan-add-attachment" onclick="showFilePicker(${plan.id})">
                                    + 添加资料
                                </div>
                            </div>
                        </div>
                        <div style="margin-top: 10px; display: flex; gap: 8px;">
                            <button class="btn-icon btn-edit" onclick="editPlan(${plan.id})">✏️</button>
                            <button class="btn-icon btn-delete" onclick="deletePlan(${plan.id})">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleAttachments(planId) {
            const list = document.getElementById(`attachments-${planId}`);
            const toggle = document.getElementById(`toggle-${planId}`);
            if (list.style.display === 'none') {
                list.style.display = 'flex';
                toggle.classList.add('expanded');
            } else {
                list.style.display = 'none';
                toggle.classList.remove('expanded');
            }
        }

        function showFilePicker(planId) {
            document.getElementById('file-picker-plan-id').value = planId;
            renderFilePicker(planId);
            document.getElementById('file-picker-modal').classList.add('active');
        }

        function renderFilePicker(planId) {
            const files = getData(STORAGE_KEYS.FILES);
            const plans = getData(STORAGE_KEYS.PLANS);
            const plan = plans.find(p => p.id === planId);
            const selectedIds = plan?.attachments || [];

            const container = document.getElementById('file-picker-list');

            if (files.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <div class="empty-state-text">资料库为空，请先上传文件</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="file-picker-grid">
                    ${files.map(file => `
                        <div class="file-picker-item ${selectedIds.includes(file.id) ? 'selected' : ''}" 
                             onclick="toggleFileSelection(${file.id}, this)">
                            ${selectedIds.includes(file.id) ? '<span class="check-mark">✓</span>' : ''}
                            <div class="file-icon">${getFileIcon(file.type)}</div>
                            <div class="file-name">${escapeHtml(file.name)}</div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function toggleFileSelection(fileId, element) {
            element.classList.toggle('selected');
            const checkMark = element.querySelector('.check-mark');
            if (checkMark) {
                checkMark.remove();
            } else {
                const span = document.createElement('span');
                span.className = 'check-mark';
                span.textContent = '✓';
                element.appendChild(span);
            }
        }

        function confirmFileSelection() {
            const planId = parseInt(document.getElementById('file-picker-plan-id').value);
            const selectedItems = document.querySelectorAll('.file-picker-item.selected');
            const selectedIds = Array.from(selectedItems).map(item => {
                const files = getData(STORAGE_KEYS.FILES);
                const fileName = item.querySelector('.file-name').textContent;
                const file = files.find(f => f.name === fileName);
                return file?.id;
            }).filter(Boolean);

            const plans = getData(STORAGE_KEYS.PLANS);
            const plan = plans.find(p => p.id === planId);
            if (plan) {
                plan.attachments = selectedIds;
                saveData(STORAGE_KEYS.PLANS, plans);
            }

            closeFilePicker();
            renderPlans();
        }

        function closeFilePicker() {
            document.getElementById('file-picker-modal').classList.remove('active');
        }

        function removeAttachment(planId, fileId) {
            const plans = getData(STORAGE_KEYS.PLANS);
            const plan = plans.find(p => p.id === planId);
            if (plan) {
                plan.attachments = (plan.attachments || []).filter(id => id !== fileId);
                saveData(STORAGE_KEYS.PLANS, plans);
                renderPlans();
            }
        }

        function showPlanModal(id = null) {
            document.getElementById('plan-edit-id').value = id || '';
            document.getElementById('plan-modal-title').textContent = id ? '编辑计划' : '添加新计划';
            document.getElementById('plan-title').value = '';
            document.getElementById('plan-desc').value = '';
            document.getElementById('plan-status').value = 'progress';
            // 重置选中分类
            window.selectedPlanCategory = null;
            // 渲染分类列表和资料列表
            renderPlanCategories(null);
            renderPlanFileListByCategory(null, null);
            document.getElementById('plan-modal').classList.add('active');
        }

        function editPlan(id) {
            const plans = getData(STORAGE_KEYS.PLANS);
            const plan = plans.find(p => p.id === id);
            if (plan) {
                document.getElementById('plan-edit-id').value = id;
                document.getElementById('plan-modal-title').textContent = '编辑计划';
                document.getElementById('plan-title').value = plan.title;
                document.getElementById('plan-desc').value = plan.desc || '';
                document.getElementById('plan-status').value = plan.status;
                // 重置选中分类
                window.selectedPlanCategory = null;
                // 保存当前选中的文件ID列表
                window.planSelectedFileIds = plan.attachments || [];
                // 渲染分类列表和资料列表
                renderPlanCategories(plan.attachments || []);
                renderPlanFileListByCategory(null, plan.attachments || []);
                document.getElementById('plan-modal').classList.add('active');
            }
        }

        // 渲染计划模态框中的分类列表
        function renderPlanCategories(selectedIds = []) {
            const categories = getData(STORAGE_KEYS.CATEGORIES);
            const files = getData(STORAGE_KEYS.FILES);
            const container = document.getElementById('plan-category-list');
            if (!container) return;

            // 计算每个分类的文件数量
            const categoryCounts = {};
            files.forEach(file => {
                const catId = file.category || 'uncategorized';
                categoryCounts[catId] = (categoryCounts[catId] || 0) + 1;
            });

            // 未分类文件数量
            const uncategorizedCount = categoryCounts['uncategorized'] || 0;

            if (categories.length === 0 && uncategorizedCount === 0) {
                container.innerHTML = '';
                return;
            }

            let html = '';

            // 未分类按钮
            if (uncategorizedCount > 0) {
                html += `
                    <button class="plan-category-btn ${window.selectedPlanCategory === 'uncategorized' ? 'active' : ''}" 
                            onclick="selectPlanCategory('uncategorized')">
                        📁 未分类 <span class="count">${uncategorizedCount}</span>
                    </button>
                `;
            }

            // 分类按钮
            categories.forEach(cat => {
                const count = categoryCounts[cat.id] || 0;
                if (count > 0) {
                    html += `
                        <button class="plan-category-btn ${window.selectedPlanCategory === cat.id ? 'active' : ''}" 
                                onclick="selectPlanCategory('${cat.id}')">
                            📂 ${escapeHtml(cat.name)} <span class="count">${count}</span>
                        </button>
                    `;
                }
            });

            container.innerHTML = html;
        }

        // 选择分类
        function selectPlanCategory(categoryId) {
            window.selectedPlanCategory = categoryId;
            const selectedIds = window.planSelectedFileIds || [];
            renderPlanCategories(selectedIds);
            renderPlanFileListByCategory(categoryId, selectedIds);
        }

        // 渲染计划模态框中指定分类的文件列表
        function renderPlanFileListByCategory(categoryId, selectedIds) {
            const files = getData(STORAGE_KEYS.FILES);
            const container = document.getElementById('plan-file-list');
            if (!container) return;
            const titleEl = container.parentElement?.querySelector('.plan-file-list-title');
            selectedIds = selectedIds || [];

            // 筛选指定分类的文件
            let filteredFiles;
            if (!categoryId) {
                filteredFiles = files;
                if (titleEl) titleEl.textContent = `全部文件（${files.length}个）`;
            } else if (categoryId === 'uncategorized') {
                filteredFiles = files.filter(f => !f.category);
                if (titleEl) titleEl.textContent = `未分类文件（${filteredFiles.length}个）`;
            } else {
                filteredFiles = files.filter(f => f.category === categoryId);
                const categories = getData(STORAGE_KEYS.CATEGORIES);
                const cat = categories.find(c => c.id === categoryId);
                if (titleEl) titleEl.textContent = `${cat ? cat.name : '未知'}（${filteredFiles.length}个）`;
            }

            if (filteredFiles.length === 0) {
                container.innerHTML = '<div class="plan-file-empty">📁 该分类暂无文件</div>';
                return;
            }

            container.innerHTML = filteredFiles.map(file => `
                <div class="plan-file-item ${selectedIds.includes(file.id) ? 'selected' : ''}" onclick="togglePlanFile(this, ${file.id})">
                    <span class="check-icon">✓</span>
                    <span class="file-icon">${getFileIcon(file.type)}</span>
                    <span class="file-name">${escapeHtml(file.name)}</span>
                </div>
            `).join('');
        }

        // 切换资料选中状态
        function togglePlanFile(element, fileId) {
            element.classList.toggle('selected');
            // 维护选中状态
            if (!window.planSelectedFileIds) {
                window.planSelectedFileIds = [];
            }
            const idx = window.planSelectedFileIds.indexOf(fileId);
            if (idx > -1) {
                window.planSelectedFileIds.splice(idx, 1);
            } else {
                window.planSelectedFileIds.push(fileId);
            }
        }

        function closePlanModal() {
            document.getElementById('plan-modal').classList.remove('active');
        }

        function savePlan() {
            const id = document.getElementById('plan-edit-id').value;
            const title = document.getElementById('plan-title').value.trim();
            const desc = document.getElementById('plan-desc').value.trim();
            const status = document.getElementById('plan-status').value;

            if (!title) {
                document.getElementById('plan-title').focus();
                return;
            }

            // 获取选中的资料ID
            const selectedIds = window.planSelectedFileIds || [];

            const plans = getData(STORAGE_KEYS.PLANS);

            if (id) {
                const plan = plans.find(p => p.id === parseInt(id));
                if (plan) {
                    plan.title = title;
                    plan.desc = desc;
                    plan.status = status;
                    plan.attachments = selectedIds;
                }
            } else {
                plans.push({
                    id: Date.now(),
                    title,
                    desc,
                    status,
                    attachments: selectedIds,
                    createdAt: new Date().toISOString()
                });
            }

            saveData(STORAGE_KEYS.PLANS, plans);
            closePlanModal();
            renderPlans();
        }

        function deletePlan(id) {
            if (!confirm('确定要删除这个计划吗？')) return;
            const plans = getData(STORAGE_KEYS.PLANS);
            const filtered = plans.filter(p => p.id !== id);
            saveData(STORAGE_KEYS.PLANS, filtered);
            renderPlans();
        }

        // ==================== 资料库 ====================
        function updateUploadCategorySelect() {
            const categories = getData(STORAGE_KEYS.CATEGORIES);
            const select = document.getElementById('upload-category-select');
            if (!select) return;

            let html = '<option value="">选择分类（可选）</option>';
            categories.forEach(cat => {
                html += `<option value="${cat.id}">📂 ${escapeHtml(cat.name)}</option>`;
            });
            select.innerHTML = html;
        }

        function renderCategoryFilters() {
            const files = getData(STORAGE_KEYS.FILES);
            const categories = getData(STORAGE_KEYS.CATEGORIES);
            const container = document.getElementById('category-filter-tabs');

            // 统计每个分类的文件数量
            const catCounts = {};
            categories.forEach(cat => catCounts[cat.id] = 0);
            let uncategorized = 0;
            files.forEach(f => {
                if (f.category) {
                    catCounts[f.category] = (catCounts[f.category] || 0) + 1;
                } else {
                    uncategorized++;
                }
            });

            let html = `
                <button class="category-filter-tab ${currentFilterCategory === 'all' ? 'active' : ''}" data-category="all" onclick="filterByCategory('all')">
                    全部 <span class="count">${files.length}</span>
                </button>
            `;

            categories.forEach(cat => {
                html += `
                    <button class="category-filter-tab ${currentFilterCategory === cat.id ? 'active' : ''}" data-category="${cat.id}" onclick="filterByCategory('${cat.id}')">
                        📂 ${escapeHtml(cat.name)} <span class="count">${catCounts[cat.id] || 0}</span>
                    </button>
                `;
            });

            if (uncategorized > 0) {
                html += `
                    <button class="category-filter-tab ${currentFilterCategory === 'uncategorized' ? 'active' : ''}" data-category="uncategorized" onclick="filterByCategory('uncategorized')">
                        📋 未分类 <span class="count">${uncategorized}</span>
                    </button>
                `;
            }

            container.innerHTML = html;

            // 同时更新上传分类下拉框
            updateUploadCategorySelect();
        }

        function filterByCategory(catId) {
            currentFilterCategory = catId;
            renderCategoryFilters();
            renderFiles();
        }

        function renderFiles() {
            const files = getData(STORAGE_KEYS.FILES);
            const plans = getData(STORAGE_KEYS.PLANS);
            const container = document.getElementById('file-list');

            if (files.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <div class="empty-state-text">资料库为空，上传文件开始吧</div>
                    </div>
                `;
                return;
            }

            // 计算每个文件被哪些计划引用
            const filePlanCounts = {};
            plans.forEach(plan => {
                (plan.attachments || []).forEach(fileId => {
                    filePlanCounts[fileId] = (filePlanCounts[fileId] || 0) + 1;
                });
            });

            // 筛选文件
            let filteredFiles = files;
            if (currentFilterCategory === 'uncategorized') {
                filteredFiles = files.filter(f => !f.category);
            } else if (currentFilterCategory !== 'all') {
                filteredFiles = files.filter(f => f.category === currentFilterCategory);
            }

            if (filteredFiles.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📁</div>
                        <div class="empty-state-text">该分类下没有文件</div>
                    </div>
                `;
                return;
            }

            const categories = getData(STORAGE_KEYS.CATEGORIES);

            container.innerHTML = filteredFiles.map(file => {
                const linkedPlansCount = filePlanCounts[file.id] || 0;
                const cat = categories.find(c => c.id === file.category);
                return `
                    <div class="file-item">
                        <button class="file-delete" onclick="event.stopPropagation(); deleteFile(${file.id})">×</button>
                        <div class="file-icon" onclick="downloadFile(${file.id})">${getFileIcon(file.type)}</div>
                        <div class="file-name" onclick="downloadFile(${file.id})">${escapeHtml(file.name)}</div>
                        <div class="file-size" onclick="downloadFile(${file.id})">${formatFileSize(file.size)}</div>
                        <div class="file-category-tag ${cat ? '' : 'uncategorized'}" onclick="event.stopPropagation(); showChangeCategoryModal(${file.id})">
                            ${cat ? `📂 ${escapeHtml(cat.name)}` : '+ 添加分类'}
                        </div>
                        ${linkedPlansCount > 0 ? `<div class="file-linked-plans">📎 被${linkedPlansCount}个计划引用</div>` : '<div class="file-empty-links">暂未被引用</div>'}
                    </div>
                `;
            }).join('');
        }

        // 修改文件分类弹窗
        function showChangeCategoryModal(fileId) {
            const files = getData(STORAGE_KEYS.FILES);
            const categories = getData(STORAGE_KEYS.CATEGORIES);
            const file = files.find(f => f.id === fileId);
            if (!file) return;

            const categoriesHtml = categories.map(cat => 
                `<option value="${cat.id}" ${file.category === cat.id ? 'selected' : ''}>📂 ${escapeHtml(cat.name)}</option>`
            ).join('');

            const modal = document.createElement('div');
            modal.className = 'modal active';
            modal.id = 'change-category-modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <span class="modal-title">📂 修改分类</span>
                        <button class="modal-close" onclick="closeChangeCategoryModal()">×</button>
                    </div>
                    <div class="add-form" style="box-shadow: none; padding: 0;">
                        <p style="font-size: 14px; color: var(--text-light); margin-bottom: 12px;">📎 ${escapeHtml(file.name)}</p>
                        <select id="change-category-select" style="width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px;">
                            <option value="">📋 设为未分类</option>
                            ${categoriesHtml}
                        </select>
                        <button class="btn-add" onclick="confirmChangeCategory(${fileId})" style="margin-top: 12px;">保存</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
        }

        function closeChangeCategoryModal() {
            const modal = document.getElementById('change-category-modal');
            if (modal) modal.remove();
        }

        function confirmChangeCategory(fileId) {
            const files = getData(STORAGE_KEYS.FILES);
            const file = files.find(f => f.id === fileId);
            if (!file) return;

            const newCategory = document.getElementById('change-category-select').value;
            file.category = newCategory || null;
            saveData(STORAGE_KEYS.FILES, files);

            closeChangeCategoryModal();
            renderCategoryFilters();
            renderFiles();
        }

        // ==================== 分类管理 ====================
        function showCategoryModal() {
            renderCategoryManager();
            document.getElementById('category-modal').classList.add('active');
        }

        function closeCategoryModal() {
            document.getElementById('category-modal').classList.remove('active');
            document.getElementById('new-category-name').value = '';
        }

        function renderCategoryManager() {
            const categories = getData(STORAGE_KEYS.CATEGORIES);
            const files = getData(STORAGE_KEYS.FILES);
            const container = document.getElementById('category-manager-list');

            if (categories.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="padding: 20px;">
                        <div class="empty-state-text">暂无分类，创建一个开始管理文件吧</div>
                    </div>
                `;
                return;
            }

            container.innerHTML = categories.map(cat => {
                const fileCount = files.filter(f => f.category === cat.id).length;
                return `
                    <div class="category-list-item">
                        <div class="cat-name">
                            📂 ${escapeHtml(cat.name)}
                            <span class="cat-count">(${fileCount}个文件)</span>
                        </div>
                        <div class="cat-actions">
                            <button class="cat-btn-edit" onclick="editCategory('${cat.id}')">✏️</button>
                            <button class="cat-btn-delete" onclick="deleteCategory('${cat.id}')">🗑️</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function addCategory() {
            const nameInput = document.getElementById('new-category-name');
            const name = nameInput.value.trim();
            if (!name) {
                nameInput.focus();
                return;
            }

            const categories = getData(STORAGE_KEYS.CATEGORIES);
            // 检查是否已存在同名分类
            if (categories.some(c => c.name === name)) {
                alert('分类名称已存在');
                return;
            }

            categories.push({
                id: Date.now().toString(),
                name: name,
                createdAt: new Date().toISOString()
            });

            saveData(STORAGE_KEYS.CATEGORIES, categories);
            nameInput.value = '';
            renderCategoryManager();
            renderCategoryFilters();
            renderFiles();
        }

        function editCategory(catId) {
            const categories = getData(STORAGE_KEYS.CATEGORIES);
            const cat = categories.find(c => c.id === catId);
            if (!cat) return;

            const newName = prompt('输入新的分类名称：', cat.name);
            if (!newName || !newName.trim()) return;

            if (categories.some(c => c.id !== catId && c.name === newName.trim())) {
                alert('分类名称已存在');
                return;
            }

            cat.name = newName.trim();
            saveData(STORAGE_KEYS.CATEGORIES, categories);
            renderCategoryManager();
            renderCategoryFilters();
            renderFiles();
        }

        function deleteCategory(catId) {
            if (!confirm('确定要删除这个分类吗？删除后，分类下的文件将变为"未分类"。')) return;

            // 将该分类的文件设为未分类
            const files = getData(STORAGE_KEYS.FILES);
            files.forEach(f => {
                if (f.category === catId) {
                    f.category = null;
                }
            });
            saveData(STORAGE_KEYS.FILES, files);

            // 删除分类
            const categories = getData(STORAGE_KEYS.CATEGORIES);
            const filtered = categories.filter(c => c.id !== catId);
            saveData(STORAGE_KEYS.CATEGORIES, filtered);

            renderCategoryManager();
            renderCategoryFilters();
            renderFiles();
        }

        function getFileIcon(type) {
            if (type.startsWith('image/')) return '🖼️';
            if (type.startsWith('video/')) return '🎬';
            if (type.startsWith('audio/')) return '🎵';
            if (type.includes('pdf')) return '📄';
            if (type.includes('word') || type.includes('document')) return '📝';
            if (type.includes('sheet') || type.includes('excel')) return '📊';
            if (type.includes('presentation') || type.includes('powerpoint')) return '📽️';
            if (type.includes('zip') || type.includes('rar') || type.includes('tar')) return '📦';
            if (type.includes('text/')) return '📃';
            return '📎';
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        // 用于存储最新上传的图片ID列表
        let lastUploadedImageIds = [];

        function triggerFileUpload() {
            const selectedCategory = document.getElementById('upload-category-select').value;
            if (!selectedCategory) {
                alert('⚠️ 请先选择文件分类！');
                document.getElementById('upload-category-select').focus();
                return;
            }
            document.getElementById('file-input').click();
        }

        function handleFileUpload(event) {
            const fileList = event.target.files;
            if (!fileList.length) return;

            const selectedCategory = document.getElementById('upload-category-select').value;
            if (!selectedCategory) {
                alert('⚠️ 请先选择文件分类！');
                event.target.value = '';
                return;
            }

            const files = getData(STORAGE_KEYS.FILES);
            lastUploadedImageIds = [];

            Array.from(fileList).forEach(file => {
                // 检查是否已存在同名文件
                const exists = files.some(f => f.name === file.name);
                if (exists) {
                    alert(`文件 "${file.name}" 已存在，将被跳过`);
                    return;
                }

                // 限制文件总大小（localStorage限制约5MB）
                const totalSize = files.reduce((sum, f) => sum + f.size, 0) + file.size;
                if (totalSize > 4 * 1024 * 1024) {
                    alert('存储空间不足，请删除一些文件后再试');
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(e) {
                    const fileId = Date.now() + Math.random();
                    files.push({
                        id: fileId,
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: e.target.result,
                        category: selectedCategory,
                        uploadedAt: new Date().toISOString()
                    });

                    // 检查是否是图片
                    if (isImageFile(file.type)) {
                        lastUploadedImageIds.push(fileId);
                    }

                    saveData(STORAGE_KEYS.FILES, files);
                    renderCategoryFilters();
                    renderFiles();

                    // 如果有图片上传，打开预览
                    if (lastUploadedImageIds.length > 0) {
                        setTimeout(() => {
                            showImagePreview(lastUploadedImageIds);
                        }, 100);
                    }
                };
                reader.readAsDataURL(file);
            });

            event.target.value = '';
        }

        // 判断是否是图片文件
        function isImageFile(type) {
            return type && type.startsWith('image/');
        }

        // 显示图片预览模态框
        function showImagePreview(imageIds) {
            const files = getData(STORAGE_KEYS.FILES);
            const images = imageIds.map(id => files.find(f => f.id === id)).filter(Boolean);

            if (images.length === 0) return;

            let content = '<div class="image-preview-grid">';
            images.forEach(img => {
                content += `
                    <div class="image-preview-item">
                        <img src="${img.data}" alt="${escapeHtml(img.name)}" onclick="viewFullImage('${img.data}')">
                        <div class="image-preview-name">${escapeHtml(img.name)}</div>
                    </div>
                `;
            });
            content += '</div>';

            document.getElementById('image-preview-content').innerHTML = content;
            document.getElementById('image-preview-modal').classList.add('active');
        }

        // 全屏查看单张图片
        function viewFullImage(src) {
            const win = window.open('', '_blank');
            win.document.write(`
                <html>
                <head>
                    <title>图片预览</title>
                    <style>
                        body {
                            margin: 0;
                            padding: 20px;
                            display: flex;
                            justify-content: center;
                            align-items: center;
                            min-height: 100vh;
                            background: #1a1a1a;
                        }
                        img {
                            max-width: 100%;
                            max-height: 90vh;
                            object-fit: contain;
                        }
                    </style>
                </head>
                <body>
                    <img src="${src}" alt="预览图片">
                </body>
                </html>
            `);
            win.document.close();
        }

        function closeImagePreview() {
            document.getElementById('image-preview-modal').classList.remove('active');
        }

        function deleteFile(id) {
            const files = getData(STORAGE_KEYS.FILES);
            const file = files.find(f => f.id === id);
            if (!file) {
                alert('文件未找到');
                return;
            }

            // 检查是否有计划引用此文件
            const plans = getData(STORAGE_KEYS.PLANS);
            const referencedPlans = plans.filter(p => p.attachments && p.attachments.includes(id));
            
            let confirmMsg = `确定要删除文件「${file.name}」吗？`;
            if (referencedPlans.length > 0) {
                const planNames = referencedPlans.map(p => p.title).join('、');
                confirmMsg = `文件「${file.name}」被以下计划引用：\n${planNames}\n\n删除后会自动解除关联，确定继续吗？`;
            }

            if (!confirm(confirmMsg)) return;

            // 从文件中删除
            const filtered = files.filter(f => f.id !== id);
            saveData(STORAGE_KEYS.FILES, filtered);

            // 从引用该文件的计划中解除关联
            plans.forEach(plan => {
                if (plan.attachments) {
                    plan.attachments = plan.attachments.filter(attId => attId !== id);
                }
            });
            saveData(STORAGE_KEYS.PLANS, plans);

            renderCategoryFilters();
            renderFiles();
            renderPlans(); // 刷新计划列表，更新关联数量
        }

        function downloadFile(id) {
            const files = getData(STORAGE_KEYS.FILES);
            // 尝试多种方式匹配ID
            let file = files.find(f => f.id === id);
            if (!file) {
                file = files.find(f => String(f.id) === String(id));
            }
            if (!file) {
                console.error('文件未找到，ID:', id);
                alert('文件未找到或已被删除');
                return;
            }

            try {
                // 创建下载链接
                const link = document.createElement('a');
                link.href = file.data;
                link.download = file.name;
                link.style.display = 'none';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (e) {
                console.error('下载失败:', e);
                // 如果下载失败，尝试在新窗口打开
                const win = window.open('', '_blank');
                if (win) {
                    win.document.write(`<html><head><title>${file.name}</title></head><body><iframe src="${file.data}" style="width:100%;height:100%;border:none;"></iframe></body></html>`);
                }
            }
        }

        // ==================== 导航 ====================
        function switchPage(page) {
            currentFilter = 'today';
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.page === page);
            });
            document.querySelectorAll('.page').forEach(p => {
                p.classList.toggle('active', p.id === `page-${page}`);
            });
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.filter === 'today');
            });

            if (page === 'calendar') {
                renderCalendar();
            } else if (page === 'plans') {
                renderPlans();
            } else if (page === 'files') {
                renderCategoryFilters();
                renderFiles();
            } else if (page === 'todo') {
                renderTodos();
            }
        }

        // ==================== 工具函数 ====================
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const today = new Date();
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            if (dateStr === getTodayStr()) return '今天';
            if (dateStr === tomorrow.toISOString().split('T')[0]) return '明天';

            return `${date.getMonth() + 1}月${date.getDate()}日`;
        }

        // ==================== PWA 相关 ====================
        let deferredPrompt = null;

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then(registration => {
                        console.log('SW 注册成功:', registration.scope);
                    })
                    .catch(error => {
                        console.log('SW 注册失败:', error);
                    });
            });
        }

        // 监听 PWA 安装提示
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // 检测是否已经安装过
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
            const dismissed = localStorage.getItem('pwa-banner-dismissed');
            
            if (!isStandalone && !dismissed) {
                showPwaBanner();
            }
        });

        // 检测是否已作为 PWA 运行
        function isPWA() {
            return window.matchMedia('(display-mode: standalone)').matches 
                || navigator.standalone === true;
        }

        function showPwaBanner() {
            const banner = document.getElementById('pwa-install-banner');
            banner.classList.remove('hidden');
            
            // 绑定安装按钮
            document.getElementById('pwa-install-btn').onclick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    console.log('安装结果:', outcome);
                    deferredPrompt = null;
                    hidePwaBanner();
                }
            };
        }

        function hidePwaBanner() {
            const banner = document.getElementById('pwa-install-banner');
            banner.classList.add('hidden');
        }

        function closePwaBanner() {
            hidePwaBanner();
            localStorage.setItem('pwa-banner-dismissed', 'true');
        }

        // 检测 PWA 安装完成
        window.addEventListener('appinstalled', () => {
            console.log('PWA 已安装');
            hidePwaBanner();
            deferredPrompt = null;
        });

        // 回车添加任务
        document.getElementById('todo-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTodo();
        });

        // 导航点击
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => switchPage(item.dataset.page));
        });

        // 筛选标签
        document.querySelectorAll('.filter-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentFilter = tab.dataset.filter;
                renderTodos();
            });
        });

        // 点击模态框背景关闭
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        });

        // 初始化
        initDateInput();
        initMotivation();
        renderTodos();
        renderPlans(); // 初始化渲染计划列表
        checkNotificationPermission();
        startReminderChecker();
    </script>
</body>
</html>
